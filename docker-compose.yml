services:
  anime-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: anime-scraper:latest
    container_name: anime-scraper
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Animetsu provider
      ANIMETSU_API_BASE: "https://animetsu.live/v2/api/anime"
      SWIFTSTREAM_PROXY: "https://swiftstream.top/proxy"
      # Anikuro provider
      ANIKURO_BASE: "https://anikuro.ru"
      ANIKURO_PROXY: "https://proxy.anikuro.ru"
      # Optional: route through a self-hosted cors-anywhere when CF challenges us
      FALLBACK_PROXY: ""
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/scrape/recent?per_page=1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
